# ChaosAPI Configuration Example
# Copy to configs/chaosapi.yaml and customize

server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

upstream:
  url: "https://api.github.com"
  timeout: 10s
  tls_skip_verify: false
  max_idle_conns: 100
  max_conns_per_host: 10

policies:
  # GitHub API: add 300-1200ms latency to repository reads
  - name: "github-repo-latency"
    selector:
      path_regex: "^/repos/[^/]+/[^/]+$"
      methods: ["GET"]
      probability: 100
    latency:
      min_ms: 300
      max_ms: 1200

  # GitHub API: return 503 for a slice of issue listing requests
  - name: "github-issues-errors"
    selector:
      path_regex: "^/repos/[^/]+/[^/]+/issues$"
      methods: ["GET"]
      probability: 10
    error:
      status_code: 503
      body: '{"message": "temporary GitHub API chaos: issues endpoint unavailable"}'
      headers:
        Retry-After: "30"

  # GitHub API: timeout a portion of search requests
  - name: "github-search-timeout"
    selector:
      path_regex: "^/search/repositories$"
      methods: ["GET"]
      probability: 25
    timeout:
      timeout_ms: 250

  # GitHub API: occasional disconnect on user profile lookups
  - name: "github-user-disconnect"
    selector:
      path_regex: "^/users/[^/]+$"
      methods: ["GET"]
      probability: 5
    disconnect: {}

  # GitHub API: truncate repository lists to simulate partial reads
  - name: "github-repo-list-truncate"
    selector:
      path_regex: "^/users/[^/]+/repos$"
      methods: ["GET"]
    truncate:
      max_bytes: 1024

  # GitHub API: corrupt a small slice of README payload responses
  - name: "github-readme-corrupt"
    selector:
      path_regex: "^/repos/[^/]+/[^/]+/readme$"
      methods: ["GET"]
      headers:
        Accept: 'regex:.*application/vnd\.github\.raw\+json.*'
    corrupt:
      probability: 0.01
      byte_range: [0, 128]

metrics:
  enabled: true
  port: 9090
  path: "/metrics"

logging:
  level: info
  format: json
  sample_rate: 0.1
  max_body_log_bytes: 4096

admin_api:
  enabled: true
  port: 8081
  api_key: ""  # Set via CHAOSAPI_ADMIN_API_KEY env var
  mtls: false

hot_reload:
  enabled: true
  signal: "SIGHUP"
  debounce_ms: 100