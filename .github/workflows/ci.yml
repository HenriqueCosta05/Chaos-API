name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: application

env:
  GO_VERSION: "1.26"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: application/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  build-smoke:
    name: Build + validate-config smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: application/go.sum
      - run: go build -o ./bin/chaosapi ./cmd/chaosapi
      - name: validate-config against the example config
        run: ./bin/chaosapi -config ./configs/examples/chaosapi.yaml.example -validate-config

  lint:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    # Not yet a merge gate: the codebase hasn't been triaged against
    # golangci-lint's default rule set. Tighten to blocking once clean
    # (see docs/TODO.md).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: application/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: application
          version: latest

  security:
    name: Security scan (advisory)
    runs-on: ubuntu-latest
    # Same rationale as lint: not yet triaged, so results are surfaced but
    # don't block merges yet.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: application/go.sum
      - name: gosec
        uses: securego/gosec@master
        with:
          args: "-no-fail -fmt sarif -out gosec-results.sarif ./..."
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  docker:
    name: Docker build (multi-arch, no push)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
