version: '3.8'

services:
  chaosapi:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    image: ghcr.io/henriquecosta05/chaos-api:dev
    ports:
      - "8080:8080"
      - "8081:8081"
      - "9090:9090"
    volumes:
      - ../configs/chaosapi.yaml:/etc/chaosapi/chaosapi.yaml:ro
    environment:
      - CHAOSAPI_CONFIG=/etc/chaosapi/chaosapi.yaml
      - CHAOSAPI_LOG_LEVEL=debug
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

  # Example downstream service for testing
  httpbin:
    image: kennethreitz/httpbin:latest
    ports:
      - "8082:80"
    restart: unless-stopped

networks:
  default:
    name: chaosapi-network